<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Paiement – Chun Tian</title>
  <link rel="stylesheet" href="assets/ui.css" />
</head>
<body>
  <script src="assets/data.js"></script>
  <script src="assets/app.js"></script>
  <script>mountHeader("");</script>
  <main class="container">
  
  <section class="checkout-page">
    <h1>Paiement</h1>
    <p class="muted intro">
      Renseignez vos coordonnées et choisissez votre mode de retrait. Le paiement est simulé pour cette démo.
    </p>

    <div class="checkout-layout">
      <div class="checkout-main">
        <div class="checkout-card">
          <h2>Coordonnées</h2>
          <div class="checkout-row">
            <div class="field">
              <label for="name">Nom et prénom</label>
              <input id="name" class="input" placeholder="Nom et prénom">
            </div>
            <div class="field">
              <label for="email">Email</label>
              <input id="email" class="input" placeholder="vous@example.com">
            </div>
            <div class="field">
              <label for="phone">Téléphone</label>
              <input id="phone" class="input" placeholder="Téléphone">
            </div>
          </div>
        </div>

        <div class="checkout-card">
          <h2>Mode de retrait</h2>
          <div class="checkout-row mode-row">
            <label><input type="radio" name="mode" value="cc" checked> Click & Collect</label>
            <label><input type="radio" name="mode" value="livraison"> Livraison (≤ 5 km)</label>
          </div>
          <div id="slotArea"></div>
        </div>

        <div class="checkout-card">
          <h2>Paiement</h2>
          <p class="muted small-note">Sur cette version démo, le paiement est simulé pour créer la commande.</p>
          <div class="bar" style="justify-content:center;margin-top:8px">
            <button class="btn primary" id="pay">Payer (simulation)</button>
          </div>
        </div>
      </div>

      <aside class="cart-summary">
        <h2>Récapitulatif panier</h2>
        <div id="checkoutCart"></div>
      </aside>
    </div>
  </section>

  </main>
  <footer class="site"><a href="assets/Chuntian%20CGV.odt" target="_blank" rel="noopener">CGV</a></footer>
  
<script>
(function(){
  // Préremplir les coordonnées si l'utilisateur est connecté
  (async function prefillCustomerFromAccount(){
    try{
      const res = await fetch('/api/auth-me.php');
      const data = await res.json();
      const user = data.user || null;
      if(!user) return;
      const nameEl = document.getElementById('name');
      const emailEl = document.getElementById('email');
      if(nameEl && !nameEl.value){ nameEl.value = user.name || ''; }
      if(emailEl && !emailEl.value){ emailEl.value = user.email || ''; }
    }catch(e){
      // silencieux : on garde le formulaire vide si erreur
    }
  })();
  function slotPicker(mode){
    const root = document.getElementById('slotArea');
    const tomorrow = new Date(); if(tomorrow.getHours() >= 18){ tomorrow.setDate(tomorrow.getDate()+1); }
    function dateInput(d){ return d.toISOString().slice(0,10); }
    root.innerHTML = `
      <div class="checkout-row">
        <div class="field">
          <label for="day">Date souhaitée</label>
          <input id="day" type="date" class="input" value="${dateInput(tomorrow)}">
        </div>
        <div class="field">
          <label for="slot">Créneau</label>
          <select id="slot" class="input js-fancy"></select>
        </div>
      </div>
      ${mode==='livraison' ? `
      <div class="checkout-row">
        <button class="btn" id="loc">📍 Utiliser ma position</button>
        <div class="field">
          <label for="addr">Adresse de livraison</label>
          <input id="addr" class="input" placeholder="Adresse (optionnelle si géolocalisation)">
        </div>
        <span id="km" class="pill" style="display:none"></span>
      </div>`:''}
    `;
    function fillSlots(){
      const d = new Date(document.getElementById('day').value);
      const options = makeSlots(d).map(t=>{
        const hh = String(t.getHours()).padStart(2,'0');
        const mm = String(t.getMinutes()).padStart(2,'0');
        return `<option value="${t.toISOString()}">${hh}:${mm}</option>`;
      }).join("");
      document.getElementById('slot').innerHTML = options || '<option>Aucun créneau (fermé)</option>';
    }
    fillSlots();
    if(window.initFancySelects){ initFancySelects(root); }
    document.getElementById('day').addEventListener('change', fillSlots);
    if(mode==='livraison'){
      document.getElementById('loc').addEventListener('click', ()=>{
        if(!navigator.geolocation){ flash('Géolocalisation indisponible', false); return; }
        navigator.geolocation.getCurrentPosition(pos => {
          const d = haversine(pos.coords.latitude, pos.coords.longitude, STORE.coords.lat, STORE.coords.lon);
          const chip = document.getElementById('km'); chip.style.display='inline-block';
          chip.textContent = d.toFixed(2) + ' km du magasin';
          if(d > STORE.delivery_km){ flash('Hors zone (> 5 km)', false); }
        }, err => { flash('Échec géoloc', false); });
      });
    }
  }
  
  const modeEls = document.querySelectorAll('input[name=mode]');
  function onModeChange(){
    const mode = document.querySelector('input[name=mode]:checked').value;
    slotPicker(mode);
    if(window.renderCheckoutCart) window.renderCheckoutCart();
  }
  modeEls.forEach(r => r.addEventListener('change', onModeChange));
  slotPicker('cc');

  document.getElementById('pay').addEventListener('click', async ()=>{
  const name = document.getElementById('name').value.trim();
  const email = document.getElementById('email').value.trim();
  const phone = document.getElementById('phone').value.trim();
  const mode = document.querySelector('input[name=mode]:checked').value;
  const slotIso = document.getElementById('slot').value;
  const address = (mode==='livraison') ? (document.getElementById('addr')?.value || '') : '';

  if(!name || !email){ flash('Nom + email requis', false); return; }
  if(!getCart().length){ flash('Panier vide', false); return; }

  const cart = getCart().map(it=>({ id: it.id, qty: it.qty, ripeness: it.ripeness || null }));

  try{
    const res = await fetch('/api/checkout.php', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ customer:{name,email,phone}, mode, slot: slotIso, address, cart })
    });
    const data = await res.json();
    if(!data.ok){
      const msg = data.message || data.error || 'checkout_failed';
      throw new Error(msg);
    }
    window.location = data.url; 
  }catch(e){
    console.error(e);
    flash('Paiement indisponible: ' + (e?.message || ''), false);
  }
  });

  // Récapitulatif panier sur la droite (sous-total + FDP 3,99 € si livraison et < 45 €)
  const DELIVERY_FEE = 3.99;
  const FREE_DELIVERY_MIN = 45;
  async function renderCheckoutCart(){
    const root = document.getElementById('checkoutCart');
    if(!root) return;
    const cart = getCart();
    if(!cart.length){
      root.innerHTML = '<p class="muted">Votre panier est vide.</p>';
      return;
    }
    const products = await Promise.all(cart.map(it => findProduct(it.id)));
    const lines = cart.map((it, idx)=>{
      const p = products[idx];
      if(!p) return '';
      const subtotal = p.price * it.qty;
      const ripeness = it.ripeness ? ` – ${it.ripeness}` : '';
      return `<div class="bar" style="justify-content:space-between;margin-bottom:4px">
        <span>${it.qty} × ${p.name}${ripeness}</span>
        <span><strong>${money(subtotal)}</strong></span>
      </div>`;
    }).join("");
    const subtotal = cart.reduce((s,it,idx)=>{
      const p = products[idx]; return s + (p ? p.price*it.qty : 0);
    },0);
    const mode = document.querySelector('input[name=mode]:checked')?.value || 'cc';
    const addDelivery = mode === 'livraison' && subtotal < FREE_DELIVERY_MIN;
    const deliveryAmount = addDelivery ? DELIVERY_FEE : 0;
    const total = subtotal + deliveryAmount;
    let footer = `<hr style="margin:8px 0;border:none;border-top:1px solid var(--line)"><div class="bar" style="justify-content:space-between;margin-bottom:2px"><span>Sous-total </span><span>${money(subtotal)}</span></div>`;
    if(addDelivery){
      footer += `<div class="bar" style="justify-content:space-between;margin-bottom:2px"><span>Livraison </span><span>${money(DELIVERY_FEE)}</span></div>`;
    }
    footer += `<p style="margin-top:6px"><strong>Total : ${money(total)}</strong></p>`;
    root.innerHTML = lines + footer;
  }
  window.renderCheckoutCart = renderCheckoutCart;
  renderCheckoutCart();
})();
</script>

</body>
</html>
