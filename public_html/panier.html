<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Panier – Chun Tian</title>
  <link rel="stylesheet" href="assets/ui.css" />
</head>
<body>
  <script src="assets/data.js"></script>
  <script src="assets/app.js"></script>
  <script>mountHeader("");</script>
  <main class="container">
  
  <h1>Mon panier</h1>
  <div id="cart"></div>
  <div class="bar" style="margin-top:16px">
    <a class="btn" href="index.html">Continuer mes achats</a>
    <a class="btn primary" id="toCheckout">Passer au paiement</a>
  </div>

  </main>
  <footer class="site">Démo locale – HTML/CSS/JS vanilla</footer>
  
<script>
(function(){
  function render(){
    const el = document.getElementById('cart');
    const cart = getCart();
    if(!cart.length){ el.innerHTML = '<p>Panier vide.</p>'; return; }
    const lines = cart.map(it => {
      const p = findProduct(it.id);
      if(!p) return '';
      const subtotal = p.price * it.qty;
      return `<div class="card" style="padding:12px;margin:8px 0;display:grid;grid-template-columns:1fr auto auto;gap:8px;align-items:center">
        <div><strong>${p.name}</strong><div class="muted">${p.unit||''}</div></div>
        <div>
          <input type="number" min="0" value="${it.qty}" data-qty="${p.id}" style="width:80px" />
        </div>
        <div><strong>${money(subtotal)}</strong></div>
      </div>`;
    }).join("");
    const total = cart.reduce((s,it)=>{
      const p = findProduct(it.id); return s + (p? p.price*it.qty : 0);
    },0);
    el.innerHTML = lines + `<h3>Total : ${money(total)}</h3>`;
  }
  document.addEventListener('input', e=>{
    const inp = e.target.closest('[data-qty]'); if(!inp) return;
    const id = inp.dataset.qty; const qty = parseInt(inp.value||'0',10);
    setQty(id, qty); render();
  });
  document.getElementById('toCheckout').addEventListener('click', ()=>{
    if(!getCart().length){ flash('Panier vide', false); return; }
    location.href = 'checkout.html';
  });
  render();
})();
</script>

</body>
</html>
