<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Panier – Chun Tian</title>
  <link rel="stylesheet" href="assets/ui.css" />
</head>
<body>
  <script src="assets/data.js"></script>
  <script src="assets/app.js"></script>
  <script>mountHeader("");</script>
  <main class="container">
  
  <section class="cart-page">
    <h1>Mon panier</h1>
    <p class="muted intro">
      Retrouvez ici le détail de vos fruits et légumes sélectionnés. Vous pouvez ajuster les quantités avant de passer au paiement.
    </p>

    <div class="cart-layout">
      <div id="cart"></div>
      <aside class="cart-summary">
        <h2>Récapitulatif</h2>
        <div id="cartTotal"></div>
        <div class="cart-actions">
          <a class="btn" href="index.html">Continuer mes achats</a>
          <a class="btn primary" id="toCheckout">Passer au paiement</a>
        </div>
      </aside>
    </div>
  </section>

  </main>
  <script>mountFooter();</script>
<script>
(function(){
  async function render(){
    const el = document.getElementById('cart');
    const cart = getCart();
    const totalEl = document.getElementById('cartTotal');
    if(!cart.length){
      el.innerHTML = '<p class="muted">Votre panier est vide.</p>';
      if(totalEl) totalEl.innerHTML = '';
      return;
    }

    const products = await Promise.all(cart.map(it => findProduct(it.id)));

    const lines = cart.map((it, idx) => {
      const p = products[idx];
      if(!p) return '';
      const variantLabel = it.variant || null;
      let unitPrice = p.price;
      if(variantLabel && Array.isArray(p.variants) && p.variants.length){
        const v = p.variants.find(x=>(x.label||'')===variantLabel);
        if(v) unitPrice = v.price ?? (v.price_cents/100);
      }
      const subtotal = unitPrice * it.qty;
      const ripeness = it.ripeness || null;
      const ripenessLabel = ripeness ? `<div class="muted">Mûreté : ${ripeness}</div>` : '';
      const variantLabelHtml = variantLabel ? `<div class="muted">Format : ${variantLabel}</div>` : '';
      return `<div class="card" style="padding:12px;margin:8px 0;display:grid;grid-template-columns:1fr auto auto auto;gap:8px;align-items:center">
        <div><strong>${p.name}</strong>${variantLabelHtml}<div class="muted">${p.unit||''}</div>${ripenessLabel}</div>
        <div>
          <input type="number" min="0" value="${it.qty}" data-qty-id="${p.id}" data-qty-ripeness="${ripeness??''}" data-qty-variant="${variantLabel??''}" style="width:80px" />
        </div>
        <div><strong>${money(subtotal)}</strong></div>
        <div><button class="btn" data-remove-id="${p.id}" data-remove-ripeness="${ripeness??''}" data-remove-variant="${variantLabel??''}">Supprimer</button></div>
      </div>`;
    }).join("");

    const total = cart.reduce((s,it,idx)=>{
      const p = products[idx];
      if(!p) return s;
      let unitPrice = p.price;
      const variantLabel = it.variant || null;
      if(variantLabel && Array.isArray(p.variants) && p.variants.length){
        const v = p.variants.find(x=>(x.label||'')===variantLabel);
        if(v) unitPrice = v.price ?? (v.price_cents/100);
      }
      return s + unitPrice*it.qty;
    },0);
    el.innerHTML = lines;
    if(totalEl){
      totalEl.innerHTML = `
        <p><strong>Total : ${money(total)}</strong></p>
        <button class="btn" data-clear-cart style="margin-top:8px;width:100%">Vider le panier</button>
      `;
    }
  }
  document.addEventListener('input', e=>{
    const inp = e.target.closest('[data-qty-id]'); if(!inp) return;
    const id = inp.dataset.qtyId;
    const ripeness = inp.dataset.qtyRipeness || null;
    const variant = inp.dataset.qtyVariant || null;
    const qty = parseInt(inp.value||'0',10);
    setQty(id, qty, ripeness, variant);
    render();
  });
  document.addEventListener('click', e=>{
    const removeBtn = e.target.closest('[data-remove-id]');
    if(removeBtn){
      const id = removeBtn.dataset.removeId;
      const ripeness = removeBtn.dataset.removeRipeness || null;
      const variant = removeBtn.dataset.removeVariant || null;
      setQty(id, 0, ripeness, variant);
      render();
      return;
    }
    const clearBtn = e.target.closest('[data-clear-cart]');
    if(clearBtn){
      clearCart();
      render();
    }
  });
  document.getElementById('toCheckout').addEventListener('click', ()=>{
    if(!getCart().length){ flash('Panier vide', false); return; }
    location.href = 'checkout.html';
  });
  render();
})();
</script>

</body>
</html>
