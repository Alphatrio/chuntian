<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Contact – Chun Tian</title>
  <link rel="stylesheet" href="assets/ui.css" />
</head>
<body>
  <script src="assets/data.js"></script>
  <script src="assets/app.js"></script>
  <script>mountHeader("contact");</script>
  <main class="container">
  
  <section class="contact-page">
    <h1>Contact</h1>
    <p class="muted" style="margin-bottom:16px">
      Une question, une commande spéciale ou un retour&nbsp;? Écrivez-nous, nous vous répondrons rapidement.
    </p>

    <div class="contact-card">
      <div class="bar contact-row">
        <div class="field">
          <label for="name">Nom</label>
          <input id="name" class="input" placeholder="Votre nom">
        </div>
        <div class="field">
          <label for="email">Email</label>
          <input id="email" class="input" placeholder="vous@example.com">
        </div>
      </div>
      <div class="field">
        <label for="message">Message</label>
        <textarea id="message" class="input" placeholder="Votre message…"></textarea>
      </div>
      <div class="bar" style="justify-content:center;margin-top:8px">
        <button id="send" class="btn primary">Envoyer</button>
      </div>
      <p class="muted small-note">Les messages sont envoyés à la boutique et visibles dans votre espace gérant.</p>
    </div>
  </section>

  </main>
  <footer class="site"><a href="assets/Chuntian%20CGV.odt" target="_blank" rel="noopener">CGV</a></footer>
  
<script>
(function(){
  async function sendMessage(){
    const payload = {
      name: document.getElementById('name').value.trim(),
      email: document.getElementById('email').value.trim(),
      message: document.getElementById('message').value.trim()
    };
    if(!payload.name || !payload.email || !payload.message){
      flash('Champs requis', false);
      return;
    }
    try{
      const res = await fetch('/api/contact.php', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify(payload)
      });
      const data = await res.json().catch(()=>({ok:false}));
      if(!res.ok || !data.ok){
        flash('Erreur lors de l’envoi', false);
        return;
      }
      flash('Message envoyé ✅');
      document.getElementById('message').value='';
    }catch(e){
      flash('Erreur réseau', false);
    }
  }

  document.getElementById('send').addEventListener('click', sendMessage);
})();
</script>

</body>
</html>
